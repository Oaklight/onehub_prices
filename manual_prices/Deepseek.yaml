models:
  Deepseek:
    # 模型定价：https://api-docs.deepseek.com/zh-cn/quick_start/pricing/

    # DeepSeek V4 系列 (1M context, max 384K output, 支持思考/非思考模式)
    deepseek-v4-flash:
      input: 1 rmb / M
      output: 2 rmb / M
      extra_ratios:
        - cached_tokens: 0.02 rmb / M
    deepseek-v4-pro:
      input: 3 rmb / M
      output: 6 rmb / M
      extra_ratios:
        - cached_tokens: 0.025 rmb / M

    # DEPRECATED: deepseek-chat 和 deepseek-reasoner 将于 2026-07-24 弃用，分别对应 deepseek-v4-flash 的非思考/思考模式
    deepseek-chat:
      deprecated: 2026-07-24
      aliases:
        - deepseek-v3.2
      input: 1 rmb / M
      output: 2 rmb / M
      extra_ratios:
        - cached_tokens: 0.02 rmb / M
    deepseek-reasoner:
      deprecated: 2026-07-24
      aliases:
        - deepseek-v3.2-thinking
        - deepseek-v3.2-speciale*
      input: 1 rmb / M
      output: 2 rmb / M
      extra_ratios:
        - cached_tokens: 0.02 rmb / M
