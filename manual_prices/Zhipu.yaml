models:
  # 模型价格：https://bigmodel.cn/pricing

  Zhipu:
    # llm
    # GLM-5 系列
    glm-5-turbo:
      # 阶梯计价：[0,32K): 5元/M输入，22元/M输出，缓存1.2元/M
      # [32K+): 7元/M输入，26元/M输出，缓存1.8元/M
      input: 7 rmb / M # 取32k+的价格，最为常用
      output: 26 rmb / M
      extra_ratios:
        - cached_tokens: 1.8 rmb / M
    glm-5:
      # 阶梯计价：[0,32K): 4元/M输入，18元/M输出，缓存1元/M
      # [32K+): 6元/M输入，22元/M输出，缓存1.5元/M
      input: 6 rmb / M # 取32k+的价格，最为常用
      output: 22 rmb / M
      extra_ratios:
        - cached_tokens: 1.5 rmb / M
    # glm-5-code: 官方定价页已无此模型，疑似已被 glm-5-turbo 替代

    # GLM-4.7 系列
    glm-4.7:
      input: 4 rmb / M # 取32k-200k的价格，最为常用
      output: 16 rmb / M
      extra_ratios:
        - cached_tokens: 0.8 rmb / M
    glm-4.7-flashx:
      input: 0.5 rmb / M # 200K上下文
      output: 3 rmb / M
      extra_ratios:
        - cached_tokens: 0.1 rmb / M
    glm-4.7-flash:
      input: 0
      output: 0

    # GLM-4 系列
    glm-4-plus:
      input: 5 rmb / M # 128K上下文，高智能旗舰
      output: 2.5 rmb / M
    glm-4-air-250414:
      input: 0.5 rmb / M # 128K上下文，高性价比
      output: 0.25 rmb / M
    glm-4-airx:
      input: 10 rmb / M # 8K上下文，极速推理
      output: 0 # 不支持输出计费
    glm-4-long:
      input: 1 rmb / M # 1M上下文，超长输入
      output: 0.5 rmb / M
    glm-4-assistant:
      input: 5 rmb / M # 128K上下文，智能体应用
      output: 0 # 不支持输出计费
    glm-4-flashx-250414:
      input: 0.1 rmb / M # 128K上下文，高速低价
      output: 0.05 rmb / M
    glm-4-flash-250414:
      input: 0 # 128K上下文，免费
      output: 0

    # GLM-Z1 系列（推理模型）
    glm-z1-air:
      input: 0.5 rmb / M # 128K上下文，高性价比
      output: 0 # 不支持输出计费
    glm-z1-airx:
      input: 5 rmb / M # 32K上下文，极速推理
      output: 0 # 不支持输出计费
    glm-z1-flashx:
      input: 0.1 rmb / M # 128K上下文，高速低价
      output: 0 # 不支持输出计费
    glm-z1-flash:
      input: 0 # 128K上下文，免费
      output: 0

    # GLM-4.5 系列
    glm-4.5-air:
      # 阶梯计价：[0,32K) output[0,0.2K): 0.8元/M输入，2元/M输出
      # [0,32K) output[0.2K+): 0.8元/M输入，6元/M输出
      # [32K,128K): 1.2元/M输入，8元/M输出
      input: 1.2 rmb / M # 取32k~128k价格
      output: 8 rmb / M
      extra_ratios:
        - cached_tokens: 0.24 rmb / M

    # 旧版 GLM-4 模型（已过时但仍可用）
    glm-4-0520:
      input: 100 rmb / M # 128K上下文
      output: 50 rmb / M
    glm-4:
      input: 100 rmb / M # 128K上下文
      output: 50 rmb / M
    glm-4-air:
      input: 0.5 rmb / M # 128K上下文
      output: 0.25 rmb / M
    glm-4-flash:
      input: 0 # 128K上下文，免费
      output: 0

    # vision
    glm-4.6v:
      # 阶梯计价：[0,32K): 1元/M输入，3元/M输出
      # [32K,128K): 2元/M输入，6元/M输出
      input: 2 rmb / M # 取32~128k价格
      output: 6 rmb / M
      extra_ratios:
        - cached_tokens: 0.4 rmb / M
    glm-4.6v-flashx:
      # 阶梯计价：[0,32K): 0.15元/M输入，1.5元/M输出
      # [32K,128K): 0.3元/M输入，3元/M输出
      input: 0.3 rmb / M # 取32k~128k价格
      output: 3 rmb / M
      extra_ratios:
        - cached_tokens: 0.03 rmb / M
    glm-4.6v-flash:
      input: 0
      output: 0
    glm-4.5v:
      # 阶梯计价：[0,32K): 2元/M输入，6元/M输出
      # [32K,64K): 4元/M输入，12元/M输出
      input: 4 rmb / M # 取32~64k价格
      output: 12 rmb / M
      extra_ratios:
        - cached_tokens: 0.8 rmb / M
    glm-ocr:
      input: 0.2 rmb / M # 32K上下文，视觉推理
      output: 0 # 不支持输出计费
    glm-4v-plus-0111:
      input: 4 rmb / M # 16K上下文
      output: 2 rmb / M
    glm-4v-flash:
      input: 0
      output: 0
    glm-4.1v-thinking-flashx:
      input: 2 rmb / M # 64K上下文
      output: 0 # 不支持输出计费
    glm-4.1v-thinking-flash:
      input: 0
      output: 0

    # multimodal generation
    glm-image:
      output: 0.1 rmb / image
    cogview-4:
      output: 0.06 rmb / image
    cogvideox-3:
      output: 1 rmb / video
    cogvideox-2:
      output: 0.5 rmb / video
    viduq1-text:
      output: 2.5 rmb / video
    viduq1-image:
      output: 2.5 rmb / video
    viduq1-start-end:
      output: 2.5 rmb / video
    vidu2-image:
      output: 1.25 rmb / image
    vidu2-start-end:
      output: 1.25 rmb / image
    vidu2-reference:
      output: 2.5 rmb / video
    cogview-3-flash:
      input: 0
      output: 0
    cogvideox-flash:
      input: 0
      output: 0

    # text-to-speech / voice models
    # CogTTS: ¥4/万字符（按字符计费，非token计费，无法用标准token价格表示）
    # CogTTS-Clone: ¥6/次（音色克隆，按次计费）
    glm-4-voice:
      input: 80 rmb / M
      output: 80 rmb / M
    glm-asr:
      input: 0.06 rmb / min # 语音识别，按分钟计费
      output: 0

    # embedding models
    embedding-3:
      input: 0.5 rmb / M
      output: 0
    embedding-2:
      input: 0.5 rmb / M
      output: 0

    # some other models
    charglm-4:
      input: 1 rmb / M
      output: 1 rmb / M
    emohaa:
      input: 15 rmb / M
      output: 15 rmb / M
    codegeex-4:
      input: 0.1 rmb / M
      output: 0.1 rmb / M
    rerank:
      input: 0.8 rmb / M
