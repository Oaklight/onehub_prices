models:
  xAI:
    # model pricing: https://docs.x.ai/docs/models
    # pricing as markdown: https://docs.x.ai/developers/models.md

    # Grok 4.20 系列 (当前旗舰)
    grok-4.20:
      aliases:
        - grok-4.20-*
      input: 2 usd / M
      output: 6 usd / M
      extra_ratios:
        - cached_tokens: 0.2 usd / M

    grok-4.1-fast:
      aliases:
        - grok-4-1-fast
        - grok-4-1-fast-*
      input: 0.2 usd / M
      output: 0.5 usd / M
      extra_ratios:
        - cached_tokens: 0.05 usd / M

    grok-code:
      aliases:
        - grok-code-fast
        - grok-code-fast-*
      input: 0.2 usd / M
      output: 1.5 usd / M
      extra_ratios:
        - cached_tokens: 0.02 usd / M

    # Image/Video generation
    grok-imagine-image:
      input: 0.002 usd / image
      output: 0.02 usd / image

    grok-imagine-image-pro:
      input: 0.002 usd / image
      output: 0.07 usd / image

    grok-imagine-video:
      input: 0.002 usd / image
      output: 0.05 usd / s
      extra_ratios:
        - input_video_tokens: 0.01 usd / s

    # =========================== 已下线 ===========================
    grok-4-fast:
      aliases:
        - grok-4-fast-*
      input: 0.2 usd / M
      output: 0.5 usd / M
      extra_ratios:
        - cached_tokens: 0.05 usd / M

    grok-4:
      aliases:
        - grok-4-0709
      input: 3 usd / M
      output: 15 usd / M
      extra_ratios:
        - cached_tokens: 0.75 usd / M

    grok-3:
      aliases:
        - grok-3-beta
        - grok-3-latest
      input: 3 usd / M
      output: 15 usd / M
      extra_ratios:
        - cached_tokens: 0.75 usd / M

    grok-3-mini:
      aliases:
        - grok-3-mini-beta
        - grok-3-mini-latest
      input: 0.3 usd / M
      output: 0.5 usd / M
      extra_ratios:
        - cached_tokens: 0.075 usd / M

    grok-2:
      aliases:
        - grok-2-1212
        - grok-2-latest
      input: 2 usd / M
      output: 10 usd / M

    grok-2-vision:
      aliases:
        - grok-2-vision-1212
        - grok-2-vision-latest
      input: 2 usd / M
      output: 10 usd / M
      extra_ratios:
        - input_image_tokens: 2 usd / M

    grok-2-image:
      aliases:
        - grok-2-image-1212
        - grok-2-image-latest
      output: 0.07 usd / time
