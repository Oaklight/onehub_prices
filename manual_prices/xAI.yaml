models:
  xAI:
    # model pricing: https://docs.x.ai/developers/pricing
    # pricing as markdown: https://docs.x.ai/developers/pricing.md

    # Grok 4.3 (current flagship)
    grok-4.3:
      aliases:
        - grok-4.3-latest
        - grok-latest
        # Retired model redirects (May 15, 2026)
        - grok-3
        - grok-3-*
        - grok-4
        - grok-4-*
        - grok-code-fast
        - grok-code-fast-*
      input: 1.25 usd / M
      output: 2.50 usd / M
      extra_ratios:
        - cached_tokens: 0.20 usd / M

    # Grok 4.20 series
    grok-4.20-0309-reasoning:
      aliases:
        - grok-4.20
        - grok-4.20-0309
        - grok-4.20-reasoning
        - grok-4.20-reasoning-latest
        - grok-4.20-beta
        - grok-4.20-beta-*
        - grok-4.20-experimental-beta-*
        - grok-4.20-reasoning-gv2
      input: 1.25 usd / M
      output: 2.50 usd / M
      extra_ratios:
        - cached_tokens: 0.20 usd / M

    grok-4.20-0309-non-reasoning:
      aliases:
        - grok-4.20-non-reasoning
        - grok-4.20-non-reasoning-latest
        - grok-4.20-non-reasoning-gv2
        - grok-4.20-beta-non-reasoning
        - grok-4.20-beta-*-non-reasoning
        - grok-4.20-experimental-beta-*-non-reasoning
        - grok-4.20-experimental-beta-non-reasoning-latest
      input: 1.25 usd / M
      output: 2.50 usd / M
      extra_ratios:
        - cached_tokens: 0.20 usd / M

    grok-4.20-multi-agent-0309:
      aliases:
        - grok-4.20-multi-agent
        - grok-4.20-multi-agent-latest
        - grok-4.20-multi-agent-beta-*
        - grok-4.20-multi-agent-experimental-beta-*
      input: 1.25 usd / M
      output: 2.50 usd / M
      extra_ratios:
        - cached_tokens: 0.20 usd / M

    # Image/Video generation
    grok-imagine-image-quality:
      aliases:
        - grok-imagine-image-quality-20260403
        - grok-imagine-image-quality-latest
        - grok-imagine-image-pro
      input: 0.01 usd / image
      output: 0.05 usd / image

    grok-imagine-image:
      aliases:
        - grok-imagine-image-2026-03-02
      input: 0.002 usd / image
      output: 0.02 usd / image

    grok-imagine-video:
      input: 0.002 usd / image
      output: 0.05 usd / s
      extra_ratios:
        - input_video_tokens: 0.01 usd / s

    # Voice API
    grok-voice-think-fast-1.0:
      aliases:
        - grok-voice-latest
      # Realtime voice agent: $0.05/min ($3.00/hr)
      # TTS: $15.00/1M characters (via /v1/tts endpoint, no model param)
      # STT: $0.10/hr REST, $0.20/hr Streaming (via /v1/stt endpoint, no model param)
      input: 0
      output: 0.05 usd / min

    # =========================== 已下线 ===========================
    # Models retired May 15, 2026: grok-4-1-fast, grok-4-fast, grok-4,
    # grok-code-fast-1, grok-imagine-image-pro now redirect to grok-4.3
    # (or grok-imagine-image-quality) at current pricing.
    # These slugs are registered as grok-4.3 aliases above.
    # Historical pricing commented out for reference:
    #
    # grok-4-1-fast-reasoning:  input 0.2, output 0.5, cached 0.05 usd/M
    # grok-4-1-fast-non-reasoning: input 0.2, output 0.5, cached 0.05 usd/M
    # grok-4-fast-reasoning:    input 0.2, output 0.5, cached 0.05 usd/M
    # grok-4-0709 (grok-4):     input 3, output 15, cached 0.75 usd/M
    # grok-3:                   input 3, output 15, cached 0.75 usd/M
    # grok-3-mini:              input 0.3, output 0.5, cached 0.075 usd/M
    # grok-imagine-image-pro:   output 0.07 usd/image
    # grok-code-fast-1:         input 0.2, output 1.5, cached 0.02 usd/M

    grok-code:
      # grok-code-fast/grok-code-fast-1 retired, now grok-4.3 aliases
      # grok-code itself is not confirmed retired
      input: 0.2 usd / M
      output: 1.5 usd / M
      extra_ratios:
        - cached_tokens: 0.02 usd / M

    grok-2:
      aliases:
        - grok-2-1212
        - grok-2-latest
      input: 2 usd / M
      output: 10 usd / M

    grok-2-vision:
      aliases:
        - grok-2-vision-1212
        - grok-2-vision-latest
      input: 2 usd / M
      output: 10 usd / M
      extra_ratios:
        - input_image_tokens: 2 usd / M

    grok-2-image:
      aliases:
        - grok-2-image-1212
        - grok-2-image-latest
      output: 0.07 usd / time
