models:
  Kwaipilot:
    # 模型定价：https://www.streamlake.com/document/WANQING/mdsorb4ejjptsmfyrn#1_%E4%B8%80%E3%80%81%E5%9C%A8%E7%BA%BF%E6%8E%A8%E7%90%86

    # KAT-Coder 系列

    # KAT-Coder-Pro V2.5 (最新旗舰编程模型)
    kat-coder-pro-v2.5:
      aliases:
        - kat-coder-pro-*
      input: 5 rmb / M
      output: 20 rmb / M
      extra_ratios:
        - cached_tokens: 1 rmb / M

    # KAT-Coder-Air V2.5 (最新轻量编程模型)
    kat-coder-air-v2.5:
      aliases:
        - kat-coder-air-*
      input: 1 rmb / M
      output: 4 rmb / M
      extra_ratios:
        - cached_tokens: 0.2 rmb / M

    # KAT-Coder-Pro V2
    kat-coder-pro-v2:
      input: 2.1 rmb / M
      output: 8.4 rmb / M
      extra_ratios:
        - cached_tokens: 0.42 rmb / M

    # KAT-Coder-Pro V1
    kat-coder-pro-v1:
      input: 2.1 rmb / M
      output: 8.4 rmb / M
      extra_ratios:
        - cached_tokens: 0.42 rmb / M

    # KAT-Coder-Air V1 (免费模型)
    kat-coder-air-v1:
      input: 0 rmb / M
      output: 0 rmb / M
      extra_ratios:
        - cached_tokens: 0 rmb / M

    # KAT-Coder-Exp-72B 1010 (免费模型)
    kat-coder-exp-72b-1010:
      input: 0 rmb / M
      output: 0 rmb / M
      extra_ratios:
        - cached_tokens: 0 rmb / M

    # =========================== 已下线 ===========================
    kat-coder:
      aliases:
        - kat-coder-256k
      input: 6 rmb / M
      output: 24 rmb / M
      extra_ratios:
        - cached_tokens: 1.2 rmb / M
