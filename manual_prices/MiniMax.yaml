models:
  MiniMax:
    # 模型定价：https://platform.minimaxi.com/docs/guides/pricing-paygo

    # M2.7系列 - 最新旗舰模型
    MiniMax-M2.7:
      input: 2.1 rmb / M
      output: 8.4 rmb / M
      extra_ratios:
        - cached_tokens: 0.42 rmb / M
        - cached_write_tokens: 2.625 rmb / M

    # M2.7 Highspeed - 高效高速Agent模式（M2.7极速版）
    MiniMax-M2.7-highspeed:
      input: 4.2 rmb / M
      output: 16.8 rmb / M
      extra_ratios:
        - cached_tokens: 0.42 rmb / M
        - cached_write_tokens: 2.625 rmb / M

    # M2.5系列 - 上一代旗舰模型
    MiniMax-M2.5:
      input: 2.1 rmb / M
      output: 8.4 rmb / M
      extra_ratios:
        - cached_tokens: 0.21 rmb / M
        - cached_write_tokens: 2.625 rmb / M

    # M2.5 Highspeed - 高效高速Agent模式（M2.5极速版）
    MiniMax-M2.5-highspeed:
      aliases:
        - MiniMax-M2.5-lightning
        - MiniMax-M2.5-Lightning
      input: 4.2 rmb / M
      output: 16.8 rmb / M
      extra_ratios:
        - cached_tokens: 0.21 rmb / M
        - cached_write_tokens: 2.625 rmb / M

    # M2.1系列 - 历史模型
    MiniMax-M2.1:
      input: 2.1 rmb / M
      output: 8.4 rmb / M
      extra_ratios:
        - cached_tokens: 0.21 rmb / M
        - cached_write_tokens: 2.625 rmb / M

    # M2.1 Highspeed - 历史模型（M2.1极速版）
    MiniMax-M2.1-highspeed:
      aliases:
        - MiniMax-M2.1-lightning
        - MiniMax-M2.1-Lightning
      input: 4.2 rmb / M
      output: 16.8 rmb / M
      extra_ratios:
        - cached_tokens: 0.21 rmb / M
        - cached_write_tokens: 2.625 rmb / M

    # M2系列 - 历史模型
    MiniMax-M2:
      aliases:
        - MiniMax-M2-Stable
      input: 2.1 rmb / M
      output: 8.4 rmb / M
      extra_ratios:
        - cached_tokens: 0.21 rmb / M
        - cached_write_tokens: 2.625 rmb / M

    # M2-her - 角色扮演模型
    M2-her:
      input: 2.1 rmb / M
