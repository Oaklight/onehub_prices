      input: 0
      output: 0

    LongCat-Flash-Chat:
      deprecated: 2026-05-29
      aliases:
        - longcat-flash-chat
        - LongCat-Flash-Chat-*
      input: 0
      output: 0

    LongCat-Flash-Thinking:
      deprecated: 2026-05-29
      aliases:
        - LongCat-Flash-Thinking-*
      input: 0
      output: 0

    LongCat-Flash-Omni:
