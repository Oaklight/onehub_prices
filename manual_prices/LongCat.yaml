models:
  LongCat:
    # LongCat API开放平台：https://api.longcat.chat
    # LongCat API价格：https://longcat.chat/platform/docs/zh/Pricing/LongCat-2.0.html

    # LongCat-2.0 (1.6T MoE, 1M context, 128K max output, Agentic模型)
    # 限时折扣价: 输入 ¥2, 缓存命中 ¥0.04, 输出 ¥8
    LongCat-2.0:
      input: 5 rmb / M
      output: 20 rmb / M
      extra_ratios:
        - cached_tokens: 0.1 rmb / M

