              - paragraph [ref=e523]:
                - text: We often see clients provide images outside function response. This can lead to unexpected model behavior (e.g. thought leakage) and result in lower quality outputs. Follow the recommendation in
                - link "Multimodal Function Responses API docs" [ref=e524] [cursor=pointer]:
