              - heading "Thought preservation" [level=3] [ref=e435]
              - paragraph [ref=e436]: "The model maintains intermediate reasoning across multi-turn conversations automatically. When present in the conversation history, reasoning context carries forward, which improves performance on complex multi-step tasks like iterative debugging and code refactoring. No API changes needed:"
              - list [ref=e437]:
                - listitem [ref=e438]:
                  - strong [ref=e439]: Interactions API
                  - text: ": Thoughts are already preserved automatically. No change in behavior."
                - listitem [ref=e440]:
                  - strong [ref=e441]: GenerateContent API
                  - text: ": Beginning with Gemini 3.5 Flash, the model uses reasoning context from all previous turns when thought signatures are present in the conversation history. To enable this, pass the full, unmodified conversation history (including"
                  - link "thought signatures" [ref=e442] [cursor=pointer]:
                    - /url: /gemini-api/docs/thought-signatures
                  - text: ) in
                  - code [ref=e443]: contents
                  - text: . The SDKs handle this automatically.
              - complementary [ref=e444]:
                - strong [ref=e445]: "Note:"
                - generic [ref=e446]:
                  - text: When using the GenerateContent API, preserved thoughts increase input token count over multiple turns. For simple queries, you can clear them to reduce cost. See the
                  - link "thought signatures guide" [ref=e447] [cursor=pointer]:
                    - /url: /gemini-api/docs/thought-signatures#thought-preservation
                  - text: for details.
